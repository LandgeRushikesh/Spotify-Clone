<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spotify</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="utility.css">
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
      integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
</head>
<body>
    <main>
        <div class="main-container flex">
            <div class="left">
                <div class="home-sec bg-grey m-1 p-1">
                    <div class="logo">
                        <img src="logo.svg" alt="logo" class="invert" >
                    </div>
                    <div class="home cursor">
                        <ul>
                            <li><i class="fa-solid fa-house"></i>Home</li>
                        </ul>
                    </div>
                    <div class="search cursor">
                        <ul>
                            <li><i class="fa-solid fa-magnifying-glass"></i>Search</li>
                        </ul>
                    </div>
                </div>
                <div class="library bg-grey m-1 ">
                    <div class="head flex items-align p-1">
                        <div class="playlist-img flex items-align">
                            <img src="playlist.svg" alt="playlist" class="invert cursor">
                            <p>Your Library</p>
                        </div>
                        <i class="fa-solid fa-plus cursor"></i>
                    </div>
                    <div class="songList">
                        
                    </div>
                    <div class="footer bg-grey">
                        <div class="links cursor">
                            <a href="http://Spotify.com">Legal</a>
                            <a href="http://Spotify.com">Safety & Privacy center</a>
                            <a href="http://Spotify.com">Privacy Policy</a>
                            <a href="http://Spotify.com">Cookies</a>
                            <a href="http://Spotify.com">About Ads</a>
                            <a href="http://Spotify.com">Accessibility</a>
                            <a href="http://Spotify.com">Cookies</a>
                        </div>
                        <button class="lang-btn cursor"><i class="fa-solid fa-globe"></i>English</button>
                    </div>
                </div>
            </div>
            <div class="right bg-grey">
                <header>
                    <div class="nav flex bg-dark p-1">
                        <div class="right-left-btn">
                            <i class="fa-solid fa-chevron-left cursor"></i>
                            <i class="fa-solid fa-chevron-right cursor"></i>
                        </div>
                        <div class="login-signup-btn ">
                            <button class="signup-btn btn cursor">Sign up</button>
                            <button class="login-btn btn cursor">Log in</button>
                        </div>
                    </div>
                </header>
                <div class="spotifyPlaylist p-1">
                    <h2>Spotify Playlist</h2>
                    <div class="cardContainer flex">
                        <div class="card">
                            <button class="play-btn">
                                <i class="fa-solid fa-play"></i>
                            </button>
                            <img src="playlistCover.jpeg" alt="playlistCover">
                            <h4>Viral Hits</h4>
                            <p class="description">Viral, trending and taking off.</p>
                        </div>
                        <div class="card">
                            <button class="play-btn">
                                <i class="fa-solid fa-play"></i>
                            </button>
                            <img src="playlistCover.jpeg" alt="playlistCover">
                            <h4>Viral Hits</h4>
                            <p class="description">Viral, trending and taking off.</p>
                        </div>
                        <div class="card">
                            <button class="play-btn">
                                <i class="fa-solid fa-play"></i>
                            </button>
                            <img src="playlistCover.jpeg" alt="playlistCover">
                            <h4>Viral Hits</h4>
                            <p class="description">Viral, trending and taking off.</p>
                        </div>
                    </div>
                </div>
                <div class="music-player">
                    <div class="track">
                        <div class="songInfo">
                        
                        </div>
                        <div class="songButtons flex justify-content items-align">
                            <i class="fa-solid fa-backward-step previous cursor"></i>
                            <i class="fa-solid fa-play play cursor play play-btn"></i>
                            <i class="fa-solid fa-forward-step next cursor"></i>
                        </div>
                        <div class="songTime">
    
                        </div>
                    </div>
                    <div class="seek-bar cursor">
                        <div class="indicator">

                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>
    <script src="script.js"></script>
</body>
</html>
